<svg width="100%" height="600" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ultra-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="pro-sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="35%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="65%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#06b6d4" />
      <animate attributeName="x1" from="-100%" to="100%" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="2.5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <text x="506" y="206" 
        font-family="Arial Black, sans-serif" font-size="220" font-weight="900" 
        text-anchor="middle" dominant-baseline="middle" 
        fill="#014a57" style="letter-spacing: 10px;">
    SAMITH
  </text>
  <text x="503" y="203" 
        font-family="Arial Black, sans-serif" font-size="220" font-weight="900" 
        text-anchor="middle" dominant-baseline="middle" 
        fill="#027387" style="letter-spacing: 10px;">
    SAMITH
  </text>

  <g filter="url(#ultra-glow)">
    <text x="500" y="200" 
          font-family="Arial Black, sans-serif" font-size="220" font-weight="900" 
          text-anchor="middle" dominant-baseline="middle" 
          fill="url(#pro-sweep)" 
          stroke="#06b6d4" stroke-width="3"
          style="letter-spacing: 10px;">
      SAMITH
    </text>
  </g>

  <text x="500" y="200" 
        font-family="Arial Black, sans-serif" font-size="220" font-weight="900" 
        text-anchor="middle" dominant-baseline="middle" 
        fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.5"
        style="letter-spacing: 10px; pointer-events: none;">
    SAMITH
  </text>
</svg>
